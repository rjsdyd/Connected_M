spring.application.name=backend

# ==========================================================
# Database (MariaDB) ??
# ==========================================================
spring.datasource.url=jdbc:mariadb://localhost:3310/connected_m
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate ??
spring.jpa.generate-ddl=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================================
# Swagger (API ??) ??
# ==========================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.show-data-rest=true

# ==========================================================
# application.properties\u00EC\u0097\u0090\u00EC\u0084\u009C api-keys.properties \u00ED\u008C\u008C\u00EC\u009D\u00BC\u00EC\u009D\u0084 \u00EB\u00B6\u0088\u00EB\u009F\u00AC\u00EC\u0098\u00A4\u00EA\u00B8\u00B0
# ==========================================================
spring.config.import=optional:classpath:api-keys.properties

# ==========================================================
# Kakao API \u00EC\u0084\u00A4\u00EC\u00A0\u0095
# ==========================================================
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}

# Kakao OAuth2 ?? ??
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# ==========================================================
# JWT \u00EC\u0084\u00A4\u00EC\u00A0\u0095
# ==========================================================
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=3600000

# ==========================================================
# Google OAuth2 \u00EC\u0084\u00A4\u00EC\u00A0\u0095
# ==========================================================
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dlaudwns0903@gmail.com
# api-keys.properties
spring.mail.password=${google.mail.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
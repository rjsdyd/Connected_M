spring.application.name=backend

# ==========================================================
# Database (MariaDB) ??
# ==========================================================
spring.datasource.url=jdbc:mariadb://localhost:3310/connected_m
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate ??
spring.jpa.generate-ddl=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# [??] OSIV ?? ?? ? ??? ?? ?
spring.jpa.open-in-view=false

# ==========================================================
# Swagger (API ??) ?? - 500 ?? ?? ?? ????
# ==========================================================
# 1. ??? ?? ?? ?? (?? ???? ?? ?)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# 2. ????? ?? ?? OFF (?? 500 ??? ??! false? ???? ?)
springdoc.show-data-rest=false

# 3. ???? ?? ?? ?? (???? ???? ???! ?)
springdoc.packages-to-scan=com.Connectedm.backend.domain

# 4. ?? ??? ?? ??
server.error.include-message=always

# ==========================================================
# ?? ?? ? API ??
# ==========================================================
spring.config.import=optional:classpath:api-keys.properties
tmdb.api.base-url=https://api.themoviedb.org/3

# ==========================================================
# Security / OAuth2 ?? (Kakao, Google)
# ==========================================================
# JWT
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=3600000

# Kakao
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname, account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Google
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.user-name-attribute=sub